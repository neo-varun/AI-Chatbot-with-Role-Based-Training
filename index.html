<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #container {
            width: 420px;
            height: 650px;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #header {
            padding: 10px;
            background: #4a76a8;
            color: white;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }

        #controls {
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #ddd;
            min-height: 50px;
        }

        .controls-inner {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4a76a8;
            color: white;
            opacity: 0.7;
            transition: 0.2s;
        }

        button.active {
            opacity: 1;
            background: #2f5d8a;
        }

        select {
            padding: 6px 12px;
            border-radius: 5px;
        }

        #chatbox {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: #4a76a8;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #f1f0f0;
            color: black;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        #userInput {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        #sendBtn {
            margin-left: 5px;
            padding: 10px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="container">

    <div id="header">
        AI Chatbot
    </div>

    <div id="controls">
        <div id="controlsInner" class="controls-inner">
            <button id="generalBtn" class="active" onclick="setMode('general')">
                General Chatbot
            </button>

            <button id="roleBtn" onclick="setMode('role')">
                Query Chatbot
            </button>

            <select id="roleSelect" onchange="handleRoleChange()">
                <option value="hr">HR Assistant</option>
                <option value="tech">Tech Assistant</option>
                <option value="sales">Sales Assistant</option>
            </select>
        </div>
    </div>

    <div id="chatbox"></div>

    <div id="inputArea">
        <input type="text" id="userInput" placeholder="Type a message..." />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
let mode = "general";

document.getElementById("roleSelect").style.display = "none";

function setMode(selectedMode) {
    if (mode !== selectedMode) {
        mode = selectedMode;

        const roleSelect = document.getElementById("roleSelect");
        const generalBtn = document.getElementById("generalBtn");
        const roleBtn = document.getElementById("roleBtn");

        if (mode === "role") {
            roleSelect.style.display = "inline-block";
            roleBtn.classList.add("active");
            generalBtn.classList.remove("active");
        } else {
            roleSelect.style.display = "none";
            generalBtn.classList.add("active");
            roleBtn.classList.remove("active");
        }

        clearChat();
        resetBackendHistory();
    }
}

function handleRoleChange() {
    clearChat();
    resetBackendHistory();
}

function appendMessage(text, sender) {
    const chatbox = document.getElementById("chatbox");

    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;

    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;
}

async function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (message === "") {
        alert("Enter a message");
        return;
    }

    appendMessage(message, "user");
    input.value = "";

    let role = document.getElementById("roleSelect").value;

    let response = await fetch("http://localhost:8000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message,
            mode: mode,
            role: role
        })
    });

    let data = await response.json();

    appendMessage(data.reply, "bot");
}

function clearChat() {
    document.getElementById("chatbox").innerHTML = "";
}

async function resetBackendHistory() {
    await fetch("http://localhost:8000/reset", {
        method: "POST"
    });
}

document.getElementById("userInput")
    .addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
