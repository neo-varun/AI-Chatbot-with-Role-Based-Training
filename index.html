<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
            background: #e5e5e5;
        }

        #sidebar {
            width: 250px;
            background: #202123;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #newChatBtn {
            padding: 10px;
            margin-bottom: 10px;
            background: #4a76a8;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        #historyList {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin-bottom: 5px;
            background: #2a2b32;
            border-radius: 5px;
            cursor: pointer;
        }

        .history-item:hover {
            background: #3a3b42;
        }

        .delete-btn {
            background: red;
            border: none;
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
        }

        #main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            width: 420px;
            height: 650px;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
        }

        #header {
            padding: 10px;
            background: #4a76a8;
            color: white;
            text-align: center;
        }

        #chatbox {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
        }

        .user {
            align-self: flex-end;
            background: #4a76a8;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #f1f0f0;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            margin-left: 5px;
            padding: 8px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <button id="newChatBtn" onclick="newChat()">+ New Chat</button>
    <div id="historyList"></div>
</div>

<div id="main">
<div id="container">

    <div id="header">Customer Support Assistant</div>

    <div id="chatbox"></div>

    <div id="inputArea">
        <input id="userInput" placeholder="Type..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>
</div>

<script>
let currentChatId = null;
let chats = JSON.parse(localStorage.getItem("chats") || "{}");

function newChat() {
    currentChatId = null;
    clearChatUI();
    resetBackend();
}

function saveChats() {
    localStorage.setItem("chats", JSON.stringify(chats));
}

function renderHistory() {
    let list = document.getElementById("historyList");
    list.innerHTML = "";

    Object.keys(chats).forEach(id => {
        if (chats[id].length === 0) return;

        let item = document.createElement("div");
        item.className = "history-item";

        let title = document.createElement("span");
        title.innerText = chats[id][0].text;

        let delBtn = document.createElement("button");
        delBtn.innerText = "X";
        delBtn.className = "delete-btn";

        delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteChat(id);
        };

        item.onclick = () => loadChat(id);

        item.appendChild(title);
        item.appendChild(delBtn);
        list.appendChild(item);
    });
}

function deleteChat(id) {
    delete chats[id];
    saveChats();
    renderHistory();

    if (currentChatId === id) {
        newChat();
    }
}

function loadChat(id) {
    currentChatId = id;
    clearChatUI();

    chats[id].forEach(msg => {
        appendMessage(msg.text, msg.sender);
    });
}

function appendMessage(text, sender) {
    let chatbox = document.getElementById("chatbox");

    let div = document.createElement("div");
    div.className = "message " + sender;
    div.innerText = text;

    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
}

async function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (!message) return;

    if (!currentChatId) {
        currentChatId = Date.now().toString();
        chats[currentChatId] = [];
    }

    appendMessage(message, "user");
    chats[currentChatId].push({ sender: "user", text: message });

    input.value = "";

    let res = await fetch("http://localhost:8000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: message, mode: "smart" })
    });

    let data = await res.json();

    appendMessage(data.reply, "bot");
    chats[currentChatId].push({ sender: "bot", text: data.reply });

    saveChats();
    renderHistory();
}

function clearChatUI() {
    document.getElementById("chatbox").innerHTML = "";
}

async function resetBackend() {
    await fetch("http://localhost:8000/reset", { method: "POST" });
}

document.getElementById("userInput")
    .addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

renderHistory();
</script>

</body>
</html>
